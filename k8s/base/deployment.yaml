apiVersion: apps/v1
kind: Deployment
metadata:
  name: hearables-proxy
  labels:
    app.kubernetes.io/name: hearables-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hearables-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hearables-proxy
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: proxy
          image: ghcr.io/base3-gmbh/hearables-proxy:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
      volumes:
        - name: tmp
          emptyDir: {}
